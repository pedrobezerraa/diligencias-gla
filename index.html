  <style>
    *,*::before,*::after{box-sizing:border-box}
    body{font-family:'DM Sans',sans-serif;background:#F2EDE4;margin:0;color:#1E150A}
    textarea,input,button,select{font-family:inherit}
    textarea{resize:vertical} a{text-decoration:none}
    ::-webkit-scrollbar{width:6px}
    ::-webkit-scrollbar-thumb{background:#D4B890;border-radius:3px}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
    #gla-loading{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
      justify-content:center;background:#F2EDE4;z-index:9999;gap:14px}
    .gla-logo{font-family:'Lora',serif;font-size:28px;font-weight:700;
      background:#AD7C3A;color:#fff;padding:6px 18px;border-radius:10px;letter-spacing:1px}
    .gla-spin{width:28px;height:28px;border:3px solid #E5D5BB;border-top-color:#AD7C3A;
      border-radius:50%;animation:spin .8s linear infinite}
    .gla-lbl{font-size:12px;color:#A08060}
  </style>
</head>

const norm = s => (s || '').trim();
const isDil = t => norm(t.tipo_prazo || t['Tipo de Prazo']) === 'Diligência';
const fmtDate = d => d ? String(d).replace(/\s*00:00:00$/, '') : '';
function findContact(foro, contacts) {
  const q = norm(foro).toLowerCase().replace(/\bcomarca\s+de\s+/g, '').replace(/\bda\s+comarca\b/g, '');
  const exact = Object.keys(contacts).find(k => k.toLowerCase() === norm(foro).toLowerCase());
  if (exact) return contacts[exact];
  const ordM = q.match(/^(\d+[ºª])/);
  const ord = ordM ? ordM[1] : null;
  const skip = new Set(['especial', 'fazenda', 'publica', 'comarca', 'capital', 'vara', 'juizado']);
  const words = q.split(/\s+/).filter(w => w.length > 3 && !skip.has(w));
  const best = Object.keys(contacts).find(k => {
    const kn = k.toLowerCase().replace(/\bcomarca\s+de\s+/g, '').replace(/\bda\s+comarca\b/g, '');
    if (ord && !kn.includes(ord)) return false;
    return words.filter(w => kn.includes(w)).length >= Math.max(1, Math.floor(words.length * 0.5));
  });
  return best ? contacts[best] : null;
}

// Registra uma alteração no histórico (audit log). Falha de log nunca quebra a ação.
async function logHistory({

  acao,
  valorAntigo,
  valorNovo,
  user,
  userName
}) {
  try {

      tarefa_id: tarefa?.id || null,
      processo_judicial: tarefa?.processo_judicial || null,
      foro: tarefa?.foro || null,
      acao,
      valor_antigo: valorAntigo != null ? String(valorAntigo) : null,
      valor_novo: valorNovo != null ? String(valorNovo) : null,
      alterado_por: user?.id || null,
      alterado_por_nome: userName || null
    });
  } catch (e) {
    console.error('Falha ao registrar histórico:', e.message);
  }
}

// Hook: atualização de tarefa com debounce (evita 1 UPDATE por tecla no feedback)
function useTaskUpdater(setTasks, ctx) {
  const timers = useRef({});
  const prev = useRef({});
  const pending = useRef({}); // payloads ainda não gravados (id -> {status,feedback})
  // Ao fechar/ocultar a guia, grava imediatamente qualquer edição pendente.
  useEffect(() => {
    const flush = () => {
      const ids = Object.keys(pending.current);
      if (!ids.length) return;
      ids.forEach(id => {
        const p = pending.current[id];
        clearTimeout(timers.current[id]);
        // keepalive garante que o envio complete mesmo com a guia fechando
        try {
          fetch(`${SB_URL}/rest/v1/tarefas?id=eq.${id}`, {
            method: 'PATCH',
            keepalive: true,
            headers: {
              'apikey': SB_KEY,
              'Authorization': 'Bearer ' + SB_KEY,
              'Content-Type': 'application/json',
              'Prefer': 'return=minimal'
            },
            body: JSON.stringify({ status: p.status, feedback: p.feedback ?? null, updated_at: new Date().toISOString() })
          });
        } catch (e) {}
      });
      pending.current = {};
    };
    const onHide = () => { if (document.visibilityState === 'hidden') flush(); };
    window.addEventListener('beforeunload', flush);
    document.addEventListener('visibilitychange', onHide);
    return () => {
      window.removeEventListener('beforeunload', flush);
      document.removeEventListener('visibilitychange', onHide);
      Object.values(timers.current).forEach(clearTimeout);
    };
  }, []);
  return useCallback((id, status, feedback) => {
    let snapshot;
    setTasks(p => p.map(t => {
      if (t.id === id) {
        snapshot = t;
        return {
          ...t,
          status,
          feedback: feedback ?? t.feedback
        };
      }
      return t;
    }));
    pending.current[id] = { status, feedback: feedback ?? (snapshot ? snapshot.feedback : null) };
    clearTimeout(timers.current[id]);
    timers.current[id] = setTimeout(async () => {
      const {
        error
      } = await sb.from('tarefas').update({
        status,
        feedback: feedback ?? null,
        updated_at: new Date().toISOString()
      }).eq('id', id);
      delete pending.current[id];
      if (error) {
        console.error('Erro ao salvar tarefa:', error.message);
        return;
      }
      // Histórico: registra mudança de status e de feedback separadamente
      if (ctx && snapshot) {
        if (snapshot.status !== status) logHistory({
          tarefa: snapshot,
          acao: 'status',
          valorAntigo: snapshot.status,
          valorNovo: status,
          user: ctx.user,
          userName: ctx.userName
        });
        if (feedback != null && snapshot.feedback !== feedback) logHistory({
          tarefa: snapshot,
          acao: 'feedback',
          valorAntigo: snapshot.feedback || '(vazio)',
          valorNovo: feedback || '(vazio)',
          user: ctx.user,
          userName: ctx.userName
        });
      }
    }, 600);
  }, [setTasks, ctx]);
}

// ── Hook: acompanhamento de processos (estrela) ───────────────────────────────
function useMonitoramento(user) {
  const [starredSet, setStarredSet] = useState(() => new Set());
  const loadStarred = useCallback(async () => {
    const { data } = await sb.from('monitoramento').select('numero_processo').eq('ativo', true);
    setStarredSet(new Set((data || []).map(m => m.numero_processo)));
  }, []);
  useEffect(() => { loadStarred(); }, [loadStarred]);
  const onToggleStar = useCallback(async (task) => {
    const num = task.processo_judicial;
    if (!num) return;
    const jaTem = starredSet.has(num);
    // otimista
    setStarredSet(prev => {
      const n = new Set(prev);
      if (jaTem) n.delete(num); else n.add(num);
      return n;
    });
    if (jaTem) {
      await sb.from('monitoramento').delete().eq('numero_processo', num);
    } else {
      await sb.from('monitoramento').upsert({
        numero_processo: num,
        criado_por: user.id,
        assigned_to: task.assigned_to || null,
        ativo: true
      }, { onConflict: 'numero_processo' });
    }
  }, [starredSet, user]);
  return { starredSet, onToggleStar };
}
